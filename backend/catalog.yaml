# Dundo v1 catalog input — Creative-Commons Jamendo only.
#
# This is the source config for Phase 2:
#   python -m backend.scripts.rebuild_corpus --dry-run --limit 500
#   python -m backend.scripts.rebuild_corpus
#
# Retired from v1:
#   - iTunes / Tier-1 mainstream preview catalog
#   - FMA bulk ingest
#   - Spotify enrichment
#
# The full encode runs on a cloud GPU box after the dry run passes. Audio is
# fetched to that box from the MTG-Jamendo official mirrors, encoded, and
# discarded. Durable artifacts are pushed to the HF Dataset repo.

tier2:
  jamendo:
    count: 55000
    genres_balanced:
      - rock
      - pop
      - electronic
      - hiphop
      - folk
      - jazz
      - classical
      - ambient
      - experimental

quality_gates:
  license_allowlist:
    - "MTG-Jamendo"
    - "Creative Commons"
  per_artist_cap: 100
  duration_seconds:
    min: 20
    max: 600

phase2:
  dataset_repo: "RajatA98/dundo-corpus"
  faiss_index: "faiss.index"
  manifest_schema: "phase2-manifest-v1"

examples: []
